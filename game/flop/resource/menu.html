<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech&family=Share+Tech+Mono');

        html {
            background-color: transparent !important;
            -webkit-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        :root {
            --navbar-height: 72px;
            --tab-title-height: 72px;
        }

        body {
            font-family: "Share Tech";
            background-color: transparent !important;
            overflow:hidden;
        }

        .c-navbar {
            height: var(--navbar-height);
        }

        .c-nav-main {
            font-size: 28px;
            background: rgba(195, 29, 40) !important;
            text-shadow: rgb(204, 204, 204) 0px 0px 4px;
            color: whitesmoke;
        }

        .c-nav-main:hover {
            background: rgb(156, 23, 32) !important;
        }

        .c-nav-main:active {
            background: rgb(185, 28, 38) !important;
        }

        .c-nav-item {
            font-size: 22px;
            text-shadow: rgb(128, 128, 128) 0px 0px 3px;
        }

        .basic-view {
            width: 100%;
            height: calc(100vh - var(--navbar-height));
            top: var(--navbar-height);
            position: absolute;
        }

        #home-view {
            left: 0;
        }

        #locker-view {
            left: -100%;
        }

        /* ==========SHOP STUFF========== */
        #shop-view {
            left: -100%;
            display: grid;
            grid-template-areas: 
                "title"
                "items"
                "footer";
        }
        
        .shop-header {
            width: 100%;
            display: grid;
            align-items: start;
            justify-items: center;

            text-shadow: rgb(204, 204, 204) 0px 0px 4px;
        }

        .shop-grid {
            display: grid;
            width: 100%;
            grid-area: items;

            grid-template-columns: repeat(4, 270px);
            gap: 16px;
            justify-content: center;
            align-content: center;
        }

        .shop-footer {
            display: grid;
            width: 100%;
            grid-area: footer;

            align-items: end;
            justify-items: center;

            color: whitesmoke !important;

            text-shadow: rgb(204, 204, 204) 0px 0px 1px;
        }

        .shop-card {
            width: 270px;
            height: 420px;
            background-color: #14161A !important;
            border-color: #353A46 !important;
            border-width: 1px;
            border-style: solid;
            transition: 0.25s;
        }

        .shop-card:hover {
            background-color: #24272e !important;
        }

        .shop-card:focus {
            background-color: #0c0d0f !important;
        }

        .shop-card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            pointer-events: none !important;
        }

        #pass-view {
            left: -100%;
        }

        /*  this is only for reference, unused:
        .split-sv-view {
            width: 100%;
            height: calc(100vh - var(--navbar-height));
            display: flex;

            background-color: #101212c9;
        }

        .split-create-view {
            padding-top: 1.5rem;

            width: 50%;
            height: 100%;

            overflow-y: auto;
        }

        .split-browser-view {
            padding-top: 1.5rem;

            width: 50%;
            height: 100%;

            overflow-y: auto;
        }
        */

        button {
            border-radius: 0 !important;
            cursor: default !important;
        }

        a {
            cursor: default !important;
        }

        .square-corner-override {
            border-radius: 0 !important;
            font-family: "Share Tech" !important;
            cursor: default !important;
        }

        .sidebar {
            height: 100%;
            width: 280px;
            position: absolute;
            z-index: 68;
            top: 0;
            left: -280px;
            background-color: #101212;
            overflow-x: hidden;
            transition: 0.25s;
        }

        #sidebarbg {
            background-color: rgba(0, 0, 0, 0.65);
            width: 0;
            height: 100vh;
            position: absolute;
            z-index: 67;
        }

        .sidebar-btn {
            width: 75%;
            margin-bottom: 8px;
        }

        .ui-tooltip {
            background-color: #14161Ac9 !important;
            color: whitesmoke !important;
            transition: 0 !important;
            border-radius: 0 !important;
            pointer-events: none !important;
            border-color: #353A46c9 !important;
            box-shadow: none !important;
        }
    </style>

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>

    <script>
        function quit_game() {
            if (confirm("#FL_QuitConfirm")) {
                alert("action_quit");
            }
        }

        $( function() {
            $( document ).tooltip();
        } );
    </script>
</head>
<body>
    <div id="sidebarbg" onclick="closeNav()">
        <div id="mySidebar" class="sidebar">
            <div style="text-align: center;">
                <br>
                <h1 class="title">MULTIJOUEUR</h1>
                <button class="button is-medium sidebar-btn" onclick="alert('action_serverbrowser')" title="Rejoins un serveur hébergé par un autre joueur">Rejoindre un serveur</button>
                <br>
                <button class="button is-medium sidebar-btn" onclick="alert('action_servercreator')" title="Crée un serveur, hébergé gratuitement grâce à Steam Networking">Créer un serveur</button>

                <hr>

                <h1 class="title">SOLO</h1>
                <button class="button is-medium sidebar-btn" onclick="alert('action_training')" title="Apprends à jouer au jeu. Conseillé pour les débutants">Tutoriel</button>
                <br>
                <button class="button is-medium sidebar-btn" onclick="alert('action_firerange')" title="Entraîne ton aim et teste les armes que tu veux">Stand de tir</button>
            </div>
        </div>
    </div>

    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-menu c-navbar">
            <div class="navbar-brand">
                <img class="navbar-item" src="htm/fl_logo.png" width="128px">
            </div>

            <div
            class="navbar-start"
            style="flex-grow: 1; justify-content: center;"
            >
                <a class="navbar-item c-nav-item" onclick="home()">ACCUEIL</a>
                <a class="navbar-item c-nav-item" onclick="locker()">COLLECTION</a>
                <a class="navbar-item c-nav-main" onclick="openNav()">JOUER</a>
                <a class="navbar-item c-nav-item" onclick="shop()">BOUTIQUE</a>
                <a class="navbar-item c-nav-item" onclick="pass()" title="Notre passe de combat gratuit!">FLOP PASS</a>
                </div>

                <div
                class="navbar-end"
                >
                <a class="navbar-item" onclick="alert('action_settings')" title="Paramètres">
                    <span class="material-icons">
                    settings
                    </span>
                </a>

                <a class="navbar-item" onclick="quit_game()" title="Quitter le jeu">
                    <span class="material-icons">
                    exit_to_app
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Accueil -->
    <div class="basic-view" id="home-view">
        <h1>Home</h1>
    </div>

    <!-- Collection -->
    <div class="basic-view" id="locker-view">
        <h1>Collection</h1>
    </div>

    <!-- Boutique -->
    <div class="basic-view" id="shop-view">
        <div class="shop-header">
            <br>
            <h1 class="title is-2">Boutique de la semaine</h1>
        </div>
        <div class="shop-grid">
            <div class="shop-card"></div>
            <div class="shop-card"></div>
            <div class="shop-card"></div>
            <div class="shop-card"></div>
        </div>
        <div class="shop-footer">
            <p>La boutique reset de temps en temps pour avoir une variété de skins.</p>
            <br>
        </div>
    </div>

    <!-- Pass -->
    <div class="basic-view" id="pass-view">
        <h1>Pass</h1>
    </div>

    <script>
        /* Set the width of the sidebar to 250px and the left margin of the page content to 250px */
        function openNav() {
        document.getElementById("mySidebar").style.left = "0";
        document.getElementById("sidebarbg").style.width = "100vw";
        }

        /* Set the width of the sidebar to 0 and the left margin of the page content to 0 */
        function closeNav() {
        document.getElementById("mySidebar").style.left = "-280px";
        document.getElementById("sidebarbg").style.width = "0";
        } 

        function home() {
            document.getElementById("home-view").style.left = "0";
            document.getElementById("locker-view").style.left = "-100%";
            document.getElementById("shop-view").style.left = "-100%";
            document.getElementById("pass-view").style.left = "-100%";
        }

        function locker() {
            document.getElementById("home-view").style.left = "-100%";
            document.getElementById("locker-view").style.left = "0";
            document.getElementById("shop-view").style.left = "-100%";
            document.getElementById("pass-view").style.left = "-100%";
        }

        function shop() {
            document.getElementById("home-view").style.left = "-100%";
            document.getElementById("locker-view").style.left = "-100%";
            document.getElementById("shop-view").style.left = "0";
            document.getElementById("pass-view").style.left = "-100%";
        }

        function pass() {
            document.getElementById("home-view").style.left = "-100%";
            document.getElementById("locker-view").style.left = "-100%";
            document.getElementById("shop-view").style.left = "-100%";
            document.getElementById("pass-view").style.left = "0";
        }
    </script>
</body>
</html>
