<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech&family=Share+Tech+Mono');

        html {
            background-color: transparent !important;
            -webkit-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        :root {
            --navbar-height: 72px;
        }

        body {
            font-family: "Share Tech";
            background-color: transparent !important;
            overflow:hidden;
        }

        .c-navbar {
            height: var(--navbar-height);
        }

        .c-nav-main {
            font-size: 28px;
            background: rgba(195, 29, 40) !important;
            text-shadow: rgb(204, 204, 204) 0px 0px 4px;
            color: whitesmoke;
        }

        .c-nav-main:hover {
            background: rgb(156, 23, 32) !important;
        }

        .c-nav-main:active {
            background: rgb(185, 28, 38) !important;
        }

        .c-nav-item {
            font-size: 22px;
            text-shadow: rgb(128, 128, 128) 0px 0px 3px;
        }

        .split-sv-view {
            width: 100%;
            height: calc(100vh - var(--navbar-height));
            display: flex;

            background-color: #101212c9;
        }

        .split-create-view {
            padding-top: 1.5rem;

            width: 50%;
            height: 100%;

            overflow-y: auto;
        }

        .split-browser-view {
            padding-top: 1.5rem;

            width: 50%;
            height: 100%;

            overflow-y: auto;
        }

        button {
            border-radius: 0 !important;
        }

        .square-corner-override {
            border-radius: 0 !important;
            font-family: "Share Tech" !important;
        }
    </style>

    <script>
        function quit_game() {
            if (confirm("#FL_QuitConfirm")) {
                alert("action_quit");
            }
        }
    </script>
</head>
<body>
<!--
    <nav class="fl-topbar">
            <div class="container-fluid">
                <div class="navbar-header">
                <img alt="Brand" src="htm/fl_logo.png" height="40px">

                <center>
                <button class="fl-topbar-button">CASIER</button>
                <button class="fl-topbar-button">BOUTIQUE</button>
                <button class="fl-topbar-button fl-topbar-button-main">JOUER</button>
                <button class="fl-topbar-button" onclick="alert('action_settings')">OPTIONS</button>
                <button class="fl-topbar-button" onclick="alert('action_quit')">QUITTER</button>
                </center>
                </div>
            </div>
    </nav>
-->

    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-menu c-navbar">
            <div class="navbar-brand">
                <img class="navbar-item" src="htm/fl_logo.png" width="128px">
            </div>

            <div
            class="navbar-start"
            style="flex-grow: 1; justify-content: center;"
            >
                <a class="navbar-item c-nav-item">ACCUEIL</a>
                <a class="navbar-item c-nav-item">COLLECTION</a>
                <a class="navbar-item c-nav-main">JOUER</a>
                <a class="navbar-item c-nav-item">BOUTIQUE</a>
                <a class="navbar-item c-nav-item">FLOP PASS</a>
                </div>

                <div
                class="navbar-end"
                >
                <a class="navbar-item" onclick="alert('action_settings')">
                    <span class="material-icons">
                    settings
                    </span>
                </a>

                <a class="navbar-item" onclick="quit_game()">
                    <span class="material-icons">
                    exit_to_app
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <div class="split-sv-view">
        <div class="split-create-view container is-fluid">
            <h1 class="title is-2" style="font-weight: 400 !important;">Créer un serveur</h1>

            <div class="field">
                <input
                class="input is-normal square-corner-override"
                type="text"
                placeholder="Nom du serveur"
                />
            </div>

            <div class="field">
                <input
                class="input is-normal square-corner-override"
                type="password"
                placeholder="Mot de passe"
                />
            </div>

            <button class="button is-medium" onclick="alert('action_servercreator')">Créer</button>
        </div>

        <div class="split-browser-view container is-fluid">
            <h1 class="title is-2" style="font-weight: 400 !important;">Chercher un serveur</h1>
            
            <div style="width: 100%; text-align: center;">
                <button class="button is-medium" onclick="alert('action_serverbrowser')">Liste des serveurs</button>
            </div>

            <p style="text-align: center;">
                Les serveurs sur Flop sont hébergés par Valve grâce au système Steam Networking.
                <a>En savoir plus</a>
            </p>
        </div>
    </div>
</body>
</html>
